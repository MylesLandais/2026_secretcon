---
# Deploy Wazuh SIEM VM (replaces qm clone/set in deploy-wazuh-siem.sh).
- name: Deploy Wazuh SIEM on Proxmox
  hosts: proxmox
  gather_facts: false

  vars:
    wazuh_template_vmid: "{{ lookup('env', 'TEMPLATE_VMID') | default('9000', true) | int }}"
    wazuh_vmid: "{{ lookup('env', 'VMID') | default('110', true) | int }}"
    wazuh_vm_name: "{{ lookup('env', 'VM_NAME') | default('wazuh-siem', true) }}"
    wazuh_vm_ip: "{{ lookup('env', 'VM_IP') | default('192.168.61.10', true) }}"
    wazuh_vm_cidr: "{{ lookup('env', 'VM_CIDR') | default('24', true) }}"
    wazuh_vm_dns: "{{ lookup('env', 'VM_DNS') | default('172.16.130.2', true) }}"
    wazuh_user_data_local: "{{ playbook_dir }}/../../../provisioning/cloud-init/wazuh/user-data"
    wazuh_ssh_pub_local: "{{ lookup('env', 'SSH_PUB') | default(playbook_dir + '/../../../provisioning/ssh/packer_ed25519.pub', true) }}"

  tasks:
    - name: Require Proxmox API password
      ansible.builtin.assert:
        that:
          - proxmox_api_password | length > 0

    - name: Upload cloud-init user-data to Proxmox snippets
      ansible.builtin.copy:
        src: "{{ wazuh_user_data_local }}"
        dest: "/var/lib/vz/snippets/wazuh-user.yaml"
      delegate_to: "{{ proxmox_api_host }}"
      vars:
        ansible_user: root
        ansible_password: "{{ proxmox_api_password }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
      when: not ansible_check_mode

    - name: Upload deploy SSH public key to Proxmox
      ansible.builtin.copy:
        src: "{{ wazuh_ssh_pub_local }}"
        dest: "/root/.wazuh-deploy-pub.tmp"
        mode: "0644"
      delegate_to: "{{ proxmox_api_host }}"
      vars:
        ansible_user: root
        ansible_password: "{{ proxmox_api_password }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
      when: not ansible_check_mode

    - name: Tear down existing Wazuh VM
      ansible.builtin.include_role:
        name: proxmox_vm_destroy
      vars:
        proxmox_destroy_vmid: "{{ wazuh_vmid }}"

    - name: Clone template to Wazuh VMID
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_api_password }}"
        api_timeout: "{{ proxmox_api_timeout }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ wazuh_template_vmid }}"
        clone: "template-{{ wazuh_template_vmid }}"
        newid: "{{ wazuh_vmid }}"
        name: "{{ wazuh_vm_name }}"
        full: true
        state: present
      when: not ansible_check_mode

    - name: Remove inherited NICs from template
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_api_password }}"
        api_timeout: "{{ proxmox_api_timeout }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ wazuh_vmid }}"
        update: true
        delete: "net0,net1"
      when: not ansible_check_mode

    - name: Configure Wazuh VM (dual NIC + cloud-init)
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_api_password }}"
        api_timeout: "{{ proxmox_api_timeout }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ wazuh_vmid }}"
        update: true
        memory: 8192
        cores: 4
        cpu: host
        net:
          net0: "virtio,bridge=vmbr0,firewall=1"
          net1: "virtio,bridge=vmbr1,firewall=1"
        ipconfig:
          ipconfig0: "ip=dhcp"
          ipconfig1: "ip={{ wazuh_vm_ip }}/{{ wazuh_vm_cidr }}"
        nameservers:
          - "1.1.1.1"
          - "{{ wazuh_vm_dns }}"
        searchdomains:
          - secret-ctf.com
        cicustom: "user=local:snippets/wazuh-user.yaml"
        sshkeys: "/root/.wazuh-deploy-pub.tmp"
        agent: "enabled=1"
        onboot: true
        tags: "wazuh,siem,secretcon"
      when: not ansible_check_mode

    - name: Resize Wazuh VM disk to 100G
      ansible.builtin.command:
        cmd: "qm resize {{ wazuh_vmid }} scsi0 100G"
      delegate_to: "{{ proxmox_api_host }}"
      vars:
        ansible_user: root
        ansible_password: "{{ proxmox_api_password }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
      changed_when: true
      when: not ansible_check_mode

    - name: Start Wazuh VM
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_api_password }}"
        api_timeout: "{{ proxmox_api_timeout }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ wazuh_vmid }}"
        state: started
      when: not ansible_check_mode
