---
# CysVuln VM create on Proxmox (ISO install path). PROVISION CD build + WinRM poll stay in deploy-cysvuln.sh.
- name: Create CysVuln VM on Proxmox
  hosts: proxmox
  gather_facts: false

  vars:
    cysvuln_vmid: "{{ lookup('env', 'VMID') | default('119', true) | int }}"
    cysvuln_vm_name: "{{ lookup('env', 'VM_NAME') | default('secretcon-cysvuln-proxmox-' + (lookup('env', 'VMID') | default('119', true)), true) }}"
    cysvuln_provision_iso: "secretcon-cysvuln-prov-{{ lookup('env', 'VMID') | default('119', true) }}.iso"
    cysvuln_bridge: "{{ lookup('env', 'CHAIN_BRIDGE') | default('vmbr1', true) }}"

  tasks:
    - name: Require Proxmox API password
      ansible.builtin.assert:
        that:
          - proxmox_api_password | length > 0

    - name: Tear down existing CysVuln VM
      ansible.builtin.include_role:
        name: proxmox_vm_destroy
      vars:
        proxmox_destroy_vmid: "{{ cysvuln_vmid }}"

    - name: Create CysVuln VM with install ISOs
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_api_password }}"
        api_timeout: "{{ proxmox_api_timeout }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ cysvuln_vmid }}"
        name: "{{ cysvuln_vm_name }}"
        state: present
        memory: 8000
        cores: 1
        sockets: 1
        cpu: x86-64-v2-AES
        machine: pc-i440fx-10.1
        bios: seabios
        ostype: win10
        scsihw: virtio-scsi-single
        boot: "order=ide0;ide2;net0"
        net:
          net0: "e1000,bridge={{ cysvuln_bridge }},firewall=1"
        ide:
          ide0: "local-lvm:32,backup=0,cache=writeback,discard=on"
          ide2: "local:iso/windows-server-2016.iso,media=cdrom"
          ide3: "local:iso/{{ cysvuln_provision_iso }},media=cdrom"
      when: not ansible_check_mode

    - name: Start CysVuln VM
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_api_password }}"
        api_timeout: "{{ proxmox_api_timeout }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ cysvuln_vmid }}"
        state: started
      when: not ansible_check_mode
