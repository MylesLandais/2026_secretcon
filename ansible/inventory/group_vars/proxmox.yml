---
# Proxmox API (community.proxmox) — sourced from .env / operator environment.

proxmox_api_host: "{{ lookup('env', 'PROXMOX_HOST') | default('192.168.60.1', true) }}"
proxmox_api_user: "{{ lookup('env', 'PROXMOX_USERNAME') | default('root@pam', true) }}"
proxmox_api_password: "{{ lookup('env', 'PROXMOX_PASSWORD') }}"
proxmox_node: "{{ lookup('env', 'PROXMOX_NODE') | default('manage', true) }}"

# Optional: increase for slow Proxmox applies
proxmox_api_timeout: 60
