---
# Sub-flow (c): observability glue. Two pieces:
#   1. Stage wazuh-tvnserver-tail.ps1 under C:\secretcon. Wazuh agent.conf
#      uses <log_format>command</log_format> to invoke this script every
#      few seconds because TightVNC opens tvnserver.log with
#      FILE_SHARE_NONE and the agent's libc fopen cannot tail it. See
#      docs/notes/vnc-tvnserver-log-share-violation-2026-05-26.md.
#   2. Apply a SACL on HKLM:\SOFTWARE\TightVNC\Server so reads of the
#      VNC password key generate Security EID 4663. Wazuh rule 100805
#      consumes those events.

- name: Stage Wazuh tvnserver.log tailer
  ansible.windows.win_copy:
    src: "{{ tightvnc_tailer_filename }}"
    dest: "{{ tightvnc_tailer_dest }}"
    force: true

- name: Enable Registry object-access auditing (auditpol)
  ansible.windows.win_command: auditpol.exe /set /subcategory:"Registry" /success:enable /failure:enable
  changed_when: false
  when: not ansible_check_mode

- name: Apply audit-everyone SACL on TightVNC server registry key
  ansible.windows.win_powershell:
    script: |
      $ErrorActionPreference = 'Stop'
      $vncRegPath = '{{ tightvnc_reg_path }}'
      $current = Get-Acl -Path $vncRegPath -Audit
      $rights = [System.Security.AccessControl.RegistryRights]'QueryValues, EnumerateSubKeys, ReadKey'
      $rule = New-Object System.Security.AccessControl.RegistryAuditRule(
          'Everyone',
          $rights,
          [System.Security.AccessControl.InheritanceFlags]::ContainerInherit,
          [System.Security.AccessControl.PropagationFlags]::None,
          [System.Security.AccessControl.AuditFlags]'Success, Failure'
      )
      $alreadyApplied = $false
      foreach ($r in $current.GetAuditRules($true, $false, [System.Security.Principal.NTAccount])) {
          if ($r.IdentityReference.Value -eq 'Everyone' -and
              $r.RegistryRights -band $rights -eq $rights -and
              ($r.AuditFlags -band [System.Security.AccessControl.AuditFlags]'Success, Failure')) {
              $alreadyApplied = $true
              break
          }
      }
      if (-not $alreadyApplied) {
          $current.AddAuditRule($rule)
          Set-Acl -Path $vncRegPath -AclObject $current
          $Ansible.Changed = $true
      } else {
          $Ansible.Changed = $false
      }
  when: not ansible_check_mode

- name: Verify Wazuh tvnserver tailer is present on guest
  ansible.windows.win_stat:
    path: "{{ tightvnc_tailer_dest }}"
  register: tightvnc_tailer_stat
  when: not ansible_check_mode

- name: Require staged Wazuh tvnserver tailer
  ansible.builtin.assert:
    that:
      - tightvnc_tailer_stat.stat.exists | default(false)
  when: not ansible_check_mode
