---
# Converge Password REG_BINARY after stopping tvnserver, then reload from registry.
# TightVNC 2.8.87's MSI property can leave Password drifted even when the
# installer exits successfully, so always write the registry blob explicitly.

- name: Stop tvnserver before Password registry writes
  ansible.windows.win_service:
    name: "{{ tightvnc_service_name }}"
    state: stopped
  when:
    - not ansible_check_mode

- name: Converge TightVNC Password registry blob
  ansible.windows.win_command: >-
    reg.exe add HKLM\SOFTWARE\TightVNC\Server
    /v Password /t REG_BINARY /d {{ tightvnc_password_hex_nodash }} /f
  changed_when: true
  notify: "tightvnc service config changed"
  when:
    - not ansible_check_mode

- name: Converge TightVNC ControlPassword registry blob
  ansible.windows.win_command: >-
    reg.exe add HKLM\SOFTWARE\TightVNC\Server
    /v ControlPassword /t REG_BINARY /d {{ tightvnc_password_hex_nodash }} /f
  changed_when: true
  notify: "tightvnc service config changed"
  when:
    - not ansible_check_mode
    - (tightvnc_use_control_authentication | int) == 1

- name: Start tvnserver after Password registry writes
  ansible.windows.win_service:
    name: "{{ tightvnc_service_name }}"
    start_mode: auto
    state: started
  when:
    - not ansible_check_mode
