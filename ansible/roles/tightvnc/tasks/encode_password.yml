---
# Shared expected Password blob for MSI drift detection and registry converge.

- name: Compute expected TightVNC Password blob on controller
  ansible.builtin.command:
    argv:
      - python3
      - "{{ tightvnc_cred_tool_path }}"
      - encode
      - --password
      - "{{ tightvnc_password }}"
  delegate_to: localhost
  run_once: true
  register: tightvnc_password_encode
  changed_when: false
  check_mode: false
  vars:
    ansible_connection: local

- name: Parse expected Password blob bytes
  ansible.builtin.set_fact:
    tightvnc_password_hex: "{{ tightvnc_password_encode.stdout | trim }}"
    tightvnc_password_hex_nodash: "{{ tightvnc_password_encode.stdout | trim | replace('-', '') }}"
    tightvnc_password_bytes: >-
      {{
        (tightvnc_password_encode.stdout | trim).split('-')
        | map('int', 16) | list
      }}
