---
# Live RFB VncAuth check from the controller — fails fast when registry and runtime diverge.

- name: Flush handlers so tvnserver has restarted before auth probe
  ansible.builtin.meta: flush_handlers

- name: Ensure tvnserver is running before auth probe
  ansible.windows.win_service:
    name: "{{ tightvnc_service_name }}"
    start_mode: auto
    state: started
  when: not ansible_check_mode

- name: Brief pause for tvnserver to accept connections after restart
  ansible.builtin.pause:
    seconds: 2
  when: not ansible_check_mode

- name: Verify live VNC accepts the planted password over RFB
  ansible.builtin.set_fact:
    tightvnc_auth_probe_msg: >-
      {{
        lookup(
          'ansible.builtin.pipe',
          (ansible_playbook_python | quote)
          ~ ' '
          ~ (role_path ~ '/files/check_vnc_auth.py' | quote)
          ~ ' --host '
          ~ (tightvnc_rfb_probe_host | quote)
          ~ ' --port '
          ~ (tightvnc_listen_port | string | quote)
          ~ ' --password '
          ~ (tightvnc_password | quote)
          ~ ' --cred-tool '
          ~ (tightvnc_cred_tool_path | quote)
        )
      }}
  register: tightvnc_auth_verify
  changed_when: false
  until: tightvnc_auth_verify is succeeded
  retries: 8
  delay: 2
  when: not ansible_check_mode and not (secretcon_packer_build | default(false) | bool)
