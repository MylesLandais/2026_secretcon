---
# Firewall + service ensure.

- name: Open TCP/{{ ultravnc_listen_port }} for inbound UltraVNC
  community.windows.win_firewall_rule:
    name: "{{ ultravnc_firewall_rule_name }}"
    localport: "{{ ultravnc_listen_port }}"
    action: allow
    direction: in
    protocol: tcp
    state: present
    enabled: true

- name: Remove legacy TightVNC inbound firewall rule when present
  community.windows.win_firewall_rule:
    name: SecretCon-TightVNC-In-TCP
    state: absent
  failed_when: false
  when: ultravnc_remove_tightvnc | bool
