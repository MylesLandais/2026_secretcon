---
# Controller-side assertions before touching the guest.

- name: Load vendored VNC wordlist from controller
  ansible.builtin.set_fact:
    ultravnc_wordlist_raw: "{{ lookup('ansible.builtin.file', ultravnc_wordlist_path) }}"
  run_once: true

- name: Require vendored VNC wordlist content
  ansible.builtin.assert:
    that:
      - ultravnc_wordlist_raw | length > 0
    fail_msg: >-
      Missing wordlist at {{ ultravnc_wordlist_path }}.
      See provisioning/wordlists/readme.md.
  run_once: true

- name: Parse wordlist entries
  ansible.builtin.set_fact:
    ultravnc_wordlist_entries: >-
      {{
        ultravnc_wordlist_raw.splitlines()
        | map('trim')
        | reject('equalto', '')
        | reject('match', '^#')
        | list
      }}
  run_once: true

- name: Assert planted VNC password is in wordlist
  ansible.builtin.assert:
    that: ultravnc_password in ultravnc_wordlist_entries
    fail_msg: >-
      ultravnc_password={{ ultravnc_password }} is not listed in
      {{ ultravnc_wordlist_path }}.
  run_once: true
