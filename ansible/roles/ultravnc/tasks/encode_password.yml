---
# Registry blob for Wazuh exfil parity (same DES blob as TightVNC).

- name: Compute TightVNC-style registry blob for Wazuh exfil parity
  ansible.builtin.command:
    argv:
      - python3
      - "{{ ultravnc_cred_tool_path }}"
      - encode
      - --password
      - "{{ ultravnc_password }}"
  delegate_to: localhost
  run_once: true
  register: ultravnc_registry_blob_encode
  changed_when: false
  check_mode: false
  vars:
    ansible_connection: local
    ansible_shell_type: sh
    ansible_python_interpreter: "{{ ansible_playbook_python }}"

- name: Capture expected registry blob hex (no dashes)
  ansible.builtin.set_fact:
    ultravnc_registry_blob_hex_nodash: >-
      {{ ultravnc_registry_blob_encode.stdout | trim | replace('-', '') | upper }}
  run_once: true
