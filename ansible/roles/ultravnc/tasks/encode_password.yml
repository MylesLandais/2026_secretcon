---
# Registry blob for Wazuh exfil parity (same DES blob as TightVNC).

- name: Compute expected registry blob hex for Wazuh exfil parity
  ansible.builtin.set_fact:
    ultravnc_registry_blob_hex_nodash: >-
      {{
        lookup(
          'ansible.builtin.pipe',
          (ansible_playbook_python | quote)
          ~ ' ' ~ (ultravnc_cred_tool_path | quote)
          ~ ' encode --password '
          ~ (ultravnc_password | quote)
        )
        | trim
        | replace('-', '')
        | upper
      }}
  run_once: true
