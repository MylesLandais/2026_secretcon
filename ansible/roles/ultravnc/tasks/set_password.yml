---
# Deploy ultravnc.ini via apply-known-good.ps1 (declarative single shot).

- name: Stage UltraVNC watchdog script
  ansible.windows.win_copy:
    src: start-ultravnc-watchdog.ps1
    dest: "{{ ultravnc_install_staging_dir }}/start-ultravnc-watchdog.ps1"
    force: true

- name: Stage known-good apply script
  ansible.windows.win_copy:
    src: apply-known-good.ps1
    dest: "{{ ultravnc_install_staging_dir }}/apply-known-good.ps1"
    force: true

- name: Apply known-good UltraVNC config
  ansible.windows.win_powershell:
    script: |
      $ErrorActionPreference = 'Stop'
      & '{{ ultravnc_install_staging_dir }}\apply-known-good.ps1' `
        -Password '{{ ultravnc_password }}' `
        -RegBlobHex '{{ ultravnc_registry_blob_hex_nodash }}' `
        -Port {{ ultravnc_listen_port | int }}
  register: ultravnc_apply
  changed_when: true
  when: not ansible_check_mode

- name: Capture live passwd= hex from apply output
  ansible.builtin.set_fact:
    ultravnc_expected_passwd_hex: >-
      {{
        ultravnc_apply.output
        | select('match', '^passwd=')
        | map('regex_replace', '^passwd=', '')
        | first
        | default('UNKNOWN')
        | trim
        | upper
      }}
  when:
    - not ansible_check_mode
    - ultravnc_apply is defined

- name: Seed expected passwd placeholder before apply (check mode)
  ansible.builtin.set_fact:
    ultravnc_expected_passwd_hex: "UNKNOWN"
  when: ansible_check_mode
