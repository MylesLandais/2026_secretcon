---
# Live RFB VncAuth check from the controller (fast retries, no guest sleeps).

- name: Flush handlers so winvnc has restarted before auth probe
  ansible.builtin.meta: flush_handlers

- name: Verify live VNC accepts the planted password over RFB
  ansible.builtin.command:
    argv:
      - python3
      - "{{ role_path }}/files/check_vnc_auth.py"
      - --host
      - "{{ ansible_host }}"
      - --port
      - "{{ ultravnc_listen_port | string }}"
      - --password
      - "{{ ultravnc_password }}"
      - --cred-tool
      - "{{ ultravnc_cred_tool_path }}"
  delegate_to: localhost
  register: ultravnc_auth_verify
  changed_when: false
  until: ultravnc_auth_verify.rc == 0
  retries: 8
  delay: 2
  when: not ansible_check_mode
  vars:
    ansible_connection: local
