[defaults]
inventory          = inventory/proxmox.yml
roles_path         = roles
collections_paths  = collections
host_key_checking  = False
gathering          = smart
fact_caching       = jsonfile
fact_caching_connection = .cache/facts
stdout_callback    = default
result_format      = yaml
forks              = 5
retry_files_enabled = False

# Diff mode is the safety rail for this migration. The first run against
# live EWS at 192.168.60.109 must be --check --diff and surface only the
# Sysmon DestinationPort 5900 include + TightVNC LogLevel/LogDir drift.
diff_always        = True

[ssh_connection]
# OpenSSH on Windows ships an old sshd that does not always negotiate
# ControlMaster cleanly; pipelining works and is much faster than
# spawning a session per task.
pipelining         = True
ssh_args           = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30
