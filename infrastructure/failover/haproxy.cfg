# SecretCon EWS challenge failover frontend (operator swaps @EWS_ACTIVE_BACKEND@).
global
    maxconn 256

defaults
    mode tcp
    timeout connect 5s
    timeout client  1m
    timeout server  1m

frontend ews_challenge
    bind *:15985
    default_backend ews_active

backend ews_active
    server ews1 @EWS_ACTIVE_BACKEND@ check
