# SecretCon local-lab Arkime config.
#
# Lean profile: single OpenSearch node, no live capture interface
# (PCAPs are imported on demand via scripts/arkime-import-pcap.sh).
# The [default] node inherits config; we keep one named node ("local")
# so the import script can reference it explicitly.

[default]
elasticsearch=http://arkime.opensearch:9200
rotateIndex=daily
passwordSecret=secretcon-arkime-local
pluginsDir=/opt/arkime/plugins
parsersDir=/opt/arkime/parsers
viewHost=0.0.0.0
viewPort=8005
pcapDir=/opt/arkime/raw
maxFileSizeG=12
maxFileTimeM=60
tcpTimeout=600
tcpSaveTimeout=720
udpTimeout=30
icmpTimeout=10
maxStreams=1000000
maxPackets=10000
freeSpaceG=5%
dropUser=daemon
dropGroup=daemon

# Live-capture defaults (loopback only; the local lab does not sniff a
# real interface). Override via ARKIME__interface env if you wire a
# tap.
interface=lo
bpf=not port 9200 and not port 9201 and not port 8005
snapLen=16384
dontSaveBPFs=arp || (port 53 and host 127.0.0.1)

# Geo + ASN data is pulled by docker.sh --update-geo on first run.
geoLite2Country=/opt/arkime/etc/GeoLite2-Country.mmdb
geoLite2ASN=/opt/arkime/etc/GeoLite2-ASN.mmdb

# Plugins -- keep minimal for local lab.
plugins=writer-simple

# SPI view: VNC/RFB is what we care about for the EWS challenge. The
# default Arkime parsers handle this out of the box (port 5900); the
# 'rfb' protocol tag will appear in the session view.

[local]
nodeClass=default
