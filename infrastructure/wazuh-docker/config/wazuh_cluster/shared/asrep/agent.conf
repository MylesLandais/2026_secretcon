<!--
  Shared agent group config for the ASREP demo DC (`asrep` group).
  Subscribes Security (4768/4769 Kerberos audit), Sysmon, and PowerShell
  script-block logging so local_rules.xml 100700-100702 can fire.
-->
<agent_config>

  <localfile>
    <location>Security</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>Microsoft-Windows-Sysmon/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>Microsoft-Windows-PowerShell/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <client_buffer>
    <disabled>no</disabled>
    <queue_size>10000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

</agent_config>
