<!--
  Shared agent group config pushed by the manager to every member of the
  `ews` group. Created by scripts/wazuh-docker-up.sh after the manager
  container is healthy.

  Without this file, Wazuh agents only forward the default Security /
  System / Application channels and the entire Sysmon stream is silently
  dropped. This is the manager-side fix so the CysVuln Windows VM
  (Sysmon already installed by Install-SecretConSysmon) actually feeds
  endpoint telemetry to the SIEM.

  The three eventchannels + one syslog passthrough below are the
  msiexec-telemetry coverage promised in the blue-team report:
    1. Microsoft-Windows-Sysmon/Operational - process create, file
       create, registry, network connect events; what local_rules.xml
       100501-100514 chain off of.
    2. Microsoft-Windows-MSI/Operational - deferred CustomAction detail
       (Action=ExecPayload from msfvenom, Action=AieProbe from the wixl
       probe); paired with rule 100516.
    3. Application channel is already on by Wazuh default and carries
       MsiInstaller EIDs 1024 / 1033 / 1040 / 1042 / 11707 / 11708 -
       rule 100515 fires on rollback (EID 1042).
    4. C:\Users\Public\aie-*.log syslog passthrough so the canonical
       "Executing op: CustomActionSchedule(Action=...)" and
       "MainEngineThread is returning 1603" lines from the verbose
       msiexec /l*v log land in Wazuh as full_log entries (rule 100517).
    5. C:\EFS Software\Easy File Sharing Web Server\log\*.txt syslog
       passthrough so the EFS HTTP access log lines from Phase 04 land
       in Wazuh (NCSA Common Log Format, one line per request). Enabled
       at bootstrap time by bootstrap_cysvuln.ps1 flipping `Savelog=1`
       in option.ini; rule 100506 surfaces these in alerts.json.
-->
<agent_config>

  <localfile>
    <location>Microsoft-Windows-Sysmon/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>Microsoft-Windows-MSI/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- msiexec verbose log glob; matches aie-joe-validation.log (wixl probe)
       and aie-msfvenom-joe.log (msfvenom runner). Both are dropped under
       C:\Users\Public\ by the runners in tree. -->
  <localfile>
    <location>C:\Users\Public\aie-*.log</location>
    <log_format>syslog</log_format>
  </localfile>

  <!-- audit_aie.py --out-json drops a structured AIE indicator snapshot
       at C:\Users\Public\audit-aie-<UTC-ts>.json so the SOC has a paper
       trail of registry-audit findings without depending on Sysmon EID
       13 reads (which SwiftOnSecurity's config filters under
       SOFTWARE\Policies\Microsoft\Windows\Installer). One JSON document
       per line so the syslog passthrough produces one event per audit. -->
  <localfile>
    <location>C:\Users\Public\audit-aie-*.json</location>
    <log_format>syslog</log_format>
  </localfile>

  <!-- EFS (Easy File Sharing Web Server 6.9) HTTP access log. Logging
       is enabled at bootstrap time via bootstrap_cysvuln.ps1 flipping
       Savelog=0 -> Savelog=1 in option.ini; the file lands at
       C:\EFS Software\Easy File Sharing Web Server\log\<YYYYMMDD>.txt
       (NCSA Common Log Format, one line per request). This subscription
       is the only Phase 04 telemetry source - Sysmon EID 3 to
       fswsService.exe (rule 100503) requires the SwiftOnSecurity config
       network-connect filter to match, which it does not by default. -->
  <localfile>
    <location>C:\EFS Software\Easy File Sharing Web Server\log\*.txt</location>
    <log_format>syslog</log_format>
  </localfile>

  <!-- Speed up event sync so a 6-min iteration doesn't lose late events
       to the default 500/s rate limiter. -->
  <client_buffer>
    <disabled>no</disabled>
    <queue_size>10000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

</agent_config>
