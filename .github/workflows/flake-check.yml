name: flake-check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  local-gate:
    name: local validation gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Run CI-safe local checks
        run: nix develop -c ./scripts/test-local.sh
