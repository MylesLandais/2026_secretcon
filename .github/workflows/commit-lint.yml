name: commit-lint

on:
  pull_request:
    branches: [main]

jobs:
  conventional-and-no-emoji:
    name: Conventional Commits and no-emoji policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          conventional_re='^(feat|fix|docs|style|refactor|perf|test|build|chore|ci)(\([a-z0-9_.-]+\))?!?: .+'
          emoji_re=$'[\xF0\x9F\x80-\xF0\x9F\xBF\xE2\x98-\xE2\x9E]'

          fail=0
          while read -r sha; do
            subject=$(git log -1 --format=%s "$sha")
            body=$(git log -1 --format=%b "$sha")

            if ! [[ "$subject" =~ $conventional_re ]]; then
              echo "::error::commit $sha subject is not Conventional Commits compliant: $subject"
              fail=1
            fi

            if printf '%s\n%s' "$subject" "$body" | LC_ALL=C grep -Pq '[\x{1F300}-\x{1FAFF}\x{2600}-\x{27BF}]'; then
              echo "::error::commit $sha contains emoji in subject or body. Strip them and force-push."
              fail=1
            fi
          done < <(git rev-list "$BASE_SHA".."$HEAD_SHA")

          if [ "$fail" -ne 0 ]; then
            echo "commit-lint failed. See https://www.conventionalcommits.org/ and CONTRIBUTING.md."
            exit 1
          fi
          echo "commit-lint passed."
